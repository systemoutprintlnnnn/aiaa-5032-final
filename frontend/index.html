<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MOF QA FastAPI MVP</title>
    <style>
      :root {
        color: #14213d;
        background: #f7f9fb;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
      }

      main {
        width: min(960px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 32px;
      }

      p {
        line-height: 1.55;
      }

      form {
        display: grid;
        gap: 12px;
        margin: 24px 0;
      }

      textarea {
        min-height: 96px;
        resize: vertical;
        padding: 12px;
        border: 1px solid #b9c3cf;
        border-radius: 8px;
        font: inherit;
      }

      button {
        width: fit-content;
        padding: 10px 16px;
        border: 0;
        border-radius: 8px;
        color: white;
        background: #0f766e;
        font: inherit;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.6;
        cursor: wait;
      }

      section {
        margin: 24px 0;
      }

      pre {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        padding: 16px;
        border: 1px solid #d9e2ec;
        border-radius: 8px;
        background: white;
      }

      .grid {
        display: grid;
        gap: 12px;
      }

      .item {
        padding: 14px;
        border: 1px solid #d9e2ec;
        border-radius: 8px;
        background: white;
      }

      .muted {
        color: #576575;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>MOF QA FastAPI MVP</h1>
      <p class="muted">
        Runtime knowledge comes from open MOF-ChemUnity sample data, not from the reference PDFs/PPTX.
      </p>

      <form id="query-form">
        <textarea id="question">What is the BET surface area of UTSA-67?</textarea>
        <button id="submit" type="submit">Ask</button>
      </form>

      <section>
        <h2>Answer</h2>
        <pre id="answer">Ask a question to query the backend.</pre>
      </section>

      <section>
        <h2>Sources</h2>
        <div id="sources" class="grid"></div>
      </section>

      <section>
        <h2>KG Facts</h2>
        <div id="facts" class="grid"></div>
      </section>
    </main>

    <script>
      const form = document.querySelector("#query-form");
      const question = document.querySelector("#question");
      const submit = document.querySelector("#submit");
      const answer = document.querySelector("#answer");
      const sources = document.querySelector("#sources");
      const facts = document.querySelector("#facts");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        submit.disabled = true;
        answer.textContent = "Querying...";
        sources.innerHTML = "";
        facts.innerHTML = "";

        try {
          const response = await fetch("http://127.0.0.1:8000/api/query", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question: question.value, top_k: 6 }),
          });
          const data = await response.json();
          answer.textContent = `[mode: ${data.mode}]\n\n${data.answer}`;
          sources.innerHTML = data.sources.map((source) => `
            <div class="item">
              <strong>${source.id}</strong> ${escapeHtml(source.title)}<br />
              <span class="muted">DOI: ${escapeHtml(source.doi || "n/a")} | CSD: ${escapeHtml(source.refcode || "n/a")}</span>
              <p>${escapeHtml(source.evidence)}</p>
            </div>
          `).join("");
          facts.innerHTML = data.kg_facts.map((fact) => `
            <div class="item">
              <strong>${escapeHtml(fact.relation)}</strong><br />
              <span class="muted">${escapeHtml(fact.path)}</span>
              <p>${escapeHtml(fact.value)} (${escapeHtml(fact.source_id)})</p>
            </div>
          `).join("");
        } catch (error) {
          answer.textContent = `Request failed: ${error}`;
        } finally {
          submit.disabled = false;
        }
      });

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }
    </script>
  </body>
</html>
